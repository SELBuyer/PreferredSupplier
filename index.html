<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supplier Explorer</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
:root {
  --blue:#003B5D;
  --light:#f8fafc;
}
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #ffffff;
}
header { background: var(--blue); color: white; padding: 20px; }
h1 { margin: 0; }
.panel {
  margin: 15px;
  background: var(--light);
  border-radius: 10px;
  padding: 10px;
}
.grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}
input, select {
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: white;
  font-size: 14px;
}
button {
  padding: 8px 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
.primary { background:#1A3FD8; color:white; }
.delete { color:red; background:none; }
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  font-size: 13px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
th {
  background: var(--blue);
  color: white;
  font-size: 13px;
}
th, td {
  border: 1px solid #ddd;
  padding: 4px 6px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
th:nth-child(1), td:nth-child(1) { width: 10%; }
th:nth-child(2), td:nth-child(2) { width: 14%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 14%; }
th:nth-child(5), td:nth-child(5) { width: 14%; }
th:nth-child(6), td:nth-child(6) { width: 14%; }
th:nth-child(4) { background:#1f5aa6; }
th:nth-child(5) { background:#4f7fc4; }
th:nth-child(6) { background:#718fb8; }
tr:hover { background:#eef5ff; }
.status { font-size:13px; }
</style>
</head>
<body>
<header>
  <h1>🔎 Supplier Explorer</h1>
  <p style="margin-top:8px;font-size:14px;opacity:.9;">Search approved manufacturers and vendors. Use filters to quickly identify preferred sourcing options.</p>
</header>

<div class="panel">
  <div class="grid">
    <input id="search" placeholder="Search">
    <select id="category"></select>
    <select id="subcategory"></select>
    <select id="manufacturer"></select>
    <select id="vendor"></select>
    <button onclick="addRow()">➕ Add</button>
    <button onclick="adminLogin()">🔒 Admin Mode</button>
    <button onclick="showHelp()">❓ Help</button>
  </div>
</div>

<div class="panel status">
  Loaded rows: <strong><span id="rowCount">0</span></strong> &nbsp;|&nbsp;
  Showing rows: <strong><span id="visibleCount">0</span></strong>
</div>

<table id="table">
  <thead>
    <tr>
      <th>Category</th>
      <th>Subcategory</th>
      <th>Manufacturer</th>
      <th>Primary Vendor (Default)</th>
      <th>Secondary Vendor (Optional)</th>
      <th>Backup Vendor (Last Option)</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

  return Array.from(document.querySelectorAll("#table tbody tr"));
}

Feedback & Corrections

function titleCase(text) {
  const preservePhrases = new Set(["RS America","TD Synnex","ABB","GE","HP","FS","RSA","INS","RTDS","SHI","CDW","IE","IE Corp","IEM","KW Custom Controls","nVent AVAIL","nVent TRACHTE","VFP","P and C Panel"]);
  text = String(text ?? "").trim();
  if (preservePhrases.has(text)) return text;

  return text.split(/(\s+)/).map(part => {
    if (/^\s+$/.test(part)) return part;

    return part.split(/(-)/).map(piece => {
      if (piece === "-") return piece;

      const letters = piece.replace(/[^A-Za-z]/g, "");
      if (!letters) return piece;

      // Keep acronyms and uppercase words exactly as entered: ABB, GE, IT, AC, DC, S&C, etc.
      if (letters === letters.toUpperCase() && /[A-Z]/.test(letters)) return piece;

      // Keep mixed-case brand names exactly as entered: nVent, McNaughton, McKay, etc.
      if (/[A-Z]/.test(piece.slice(1))) return piece;

      // Normal words still display cleanly in title case.
      return piece.toLowerCase().replace(/\b[a-z]/g, l => l.toUpperCase());
    }).join("");
  }).join("");
}

function fillSelect(id, values, label) {
  const select = document.getElementById(id);
  select.innerHTML = "";
  const defaultOption = document.createElement("option");
  defaultOption.value = "";
  defaultOption.textContent = label;
  select.appendChild(defaultOption);

  Array.from(values)
    .filter(v => v && String(v).trim() && String(v).trim().toLowerCase() !== "nan")
    .sort((a,b) => String(a).localeCompare(String(b)))
    .forEach(value => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = value;
      select.appendChild(option);
    });
}

function populateFilters() {
  const categories = new Set();
  const subcategories = new Set();
  const manufacturers = new Set();
  const vendors = new Set();

  rows().forEach(row => {
    const cells = row.children;
    categories.add(cells[0].textContent.trim());
    subcategories.add(cells[1].textContent.trim());
    manufacturers.add(cells[2].textContent.trim());
    vendors.add(cells[3].textContent.trim());
    vendors.add(cells[4].textContent.trim());
    vendors.add(cells[5].textContent.trim());
  });

  fillSelect("category", categories, "All Categories");
  fillSelect("subcategory", subcategories, "All Subcategories");
  fillSelect("manufacturer", manufacturers, "All Manufacturers");
  fillSelect("vendor", vendors, "All Vendors");
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  supplierData.forEach(row => {
    const tr = document.createElement("tr");
    row.forEach(cellValue => {
      const td = document.createElement("td");
      td.contentEditable = isAdmin;
      const text = String(cellValue ?? "").trim();
      td.textContent = text.toLowerCase() === "nan" ? "" : titleCase(text);
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  updateCounts();
}

function updateCounts() {
  document.getElementById("rowCount").textContent = rows().length;
  document.getElementById("visibleCount").textContent = rows().filter(r => r.style.display !== "none").length;
}

function filter() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const c = document.getElementById("category").value;
  const s = document.getElementById("subcategory").value;
  const m = document.getElementById("manufacturer").value;
  const v = document.getElementById("vendor").value;

  rows().forEach(row => {
    const cells = row.children;
    const text = row.textContent.toLowerCase();
    const vendorValues = [cells[3].textContent.trim(), cells[4].textContent.trim(), cells[5].textContent.trim()];
    const show =
      (!q || text.includes(q)) &&
      (!c || cells[0].textContent.trim() === c) &&
      (!s || cells[1].textContent.trim() === s) &&
      (!m || cells[2].textContent.trim() === m) &&
      (!v || vendorValues.includes(v));
    row.style.display = show ? "" : "none";
  });

  updateCounts();
}

function addDeleteBtn(row) {
  if(row.children.length < 7) {
    const cell = row.insertCell(6);
    cell.innerHTML = '<button class="delete" onclick="del(this)">❌</button>';
  }
}

function adminLogin() {
  const password = prompt("Enter password");
  if(password === null) return;

  if(password === "admin123") {
    isAdmin = true;
    const headerRow = document.querySelector("#table thead tr");
    if(headerRow.children.length === 6) {
      const th = document.createElement("th");
      th.textContent = "Actions";
      headerRow.appendChild(th);
    }
    rows().forEach(row => {
      for(let i = 0; i < 6; i++) row.children[i].contentEditable = true;
      addDeleteBtn(row);
    });
    alert("Admin mode enabled");
  } else {
    alert("Wrong password");
  }
}

function addRow() {
  if(!isAdmin) {
    alert("Admin only");
    return;
  }
  const tbody = document.getElementById("tableBody");
  const row = tbody.insertRow();
  for(let i = 0; i < 6; i++) {
    const cell = row.insertCell(i);
    cell.contentEditable = true;
  }
  addDeleteBtn(row);
  populateFilters();
  filter();
}

function del(button) {
  if(!isAdmin) {
    alert("Admin only");
    return;
  }
  button.closest("tr").remove();
  populateFilters();
  filter();
}

["search", "category", "subcategory", "manufacturer", "vendor"].forEach(id => {
  document.getElementById(id).addEventListener(id === "search" ? "input" : "change", filter);
});

document.addEventListener("DOMContentLoaded", () => {
  renderTable();
  populateFilters();
  filter();
});
</script>
