<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Supplier Explorer</title>

<style>
:root{
  --blue:#003B5D;
  --light:#f8fafc;
}

body{
  font-family:Arial;
  margin:0;
  background:#ffffff;
}

table{
  box-shadow:0 1px 4px rgba(0,0,0,.08);
}

/* HEADER */
header{background:var(--blue);color:white;padding:20px}
h1{margin:0}

/* PANEL */
.panel{
  margin:15px;
  background:var(--light);
  border-radius:10px;
  padding:10px;
}

/* GRID */
.grid{
  display:grid;
  gap:10px;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
}

input,select{
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  background:white;
  font-size:14px;
}
/* BUTTON */
button{
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.primary{background:#1A3FD8;color:white}
.delete{color:red;background:none}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  font-size:13px;
}

th{
  background:var(--blue);
  color:white;
  font-size:13px;
}

th,td{
  border:1px solid #ddd;
  padding:4px 6px;
  word-wrap:break-word;
  overflow-wrap:break-word;
}

th:nth-child(1), td:nth-child(1){width:10%;}
th:nth-child(2), td:nth-child(2){width:14%;}
th:nth-child(3), td:nth-child(3){width:14%;}
th:nth-child(4), td:nth-child(4){width:14%;}
th:nth-child(5), td:nth-child(5){width:14%;}
th:nth-child(6), td:nth-child(6){width:14%;} 
th:nth-child(7),
td:nth-child(7){
  width:50px;
  text-align:center;
}

th:nth-child(4){
  background:#1f5aa6;
}

th:nth-child(5){
  background:#4f7fc4;
}

th:nth-child(6){
  background:#718fb8;
}

tr:hover{
  background:#eef5ff;
}

</style>
</head>

<body>

<header>
<h1>🔎 Supplier Explorer</h1>

<p style="margin-top:8px;font-size:14px;opacity:.9;">
Search approved manufacturers and vendors. Use filters to quickly identify preferred sourcing options.
</p>

</header>

<div class="panel">
<div class="grid">

<input id="search" placeholder="Search">

<select id="category"></select>
<select id="subcategory"></select>
<select id="manufacturer"></select>
<select id="vendor"></select>

<button onclick="addRow()">➕ Add</button>
<button onclick="adminLogin()">🔒 Admin Mode</button>
<button onclick="showHelp()">❓ Help</button>
</div>
</div>


<table id="table">
<thead>
<tr>
<th>Category</th>
<th>Subcategory</th>
<th>Manufacturer</th>
<th>Primary Vendor (Default)</th>
<th>Secondary Vendor (Optional)</th>
<th>Backup Vendor (Last Option)</th>
</tr>
</thead>

</table>

function showHelp(){

  alert(
`Supplier Explorer

How to Use
• Search by keyword.
• Filter by Category, Subcategory, Manufacturer, or Vendor.
• Primary Vendor = Default sourcing choice.
• Secondary Vendor = Alternate choice if needed.
• Backup Vendor = Last option.

Feedback & Corrections
Please contact the es_buyers@selinc.com if:
• A supplier should be added
• Vendor rankings need adjustment
• Manufacturer information is incorrect`
  );

}
function populate(){

  let cat = new Set(),
      sub = new Set(),
      man = new Set(),
      ven = new Set();

  rows().forEach(r=>{

    cat.add(r.children[0].innerText);
    sub.add(r.children[1].innerText);
    man.add(r.children[2].innerText);

    ven.add(r.children[3].innerText);
    ven.add(r.children[4].innerText);
    ven.add(r.children[5].innerText);

  });

  fill("category",cat,"All Categories");
  fill("subcategory",sub,"All Subcategories");
  fill("manufacturer",man,"All Manufacturers");
  fill("vendor",ven,"All Vendors");
}
function fill(id,set,label){

  let s = document.getElementById(id);

  s.innerHTML = `<option value="">${label}</option>`;

  [...set].sort().forEach(v=>{

    if(v && v.toLowerCase() !== "nan"){

      let o = document.createElement("option");

      o.text = v;
      o.value = v;

      s.add(o);

    }

  });

}
function filter(){

  let q = search.value.toLowerCase();

  let c = category.value;
  let s = subcategory.value;
  let m = manufacturer.value;
  let v = vendor.value;

  rows().forEach(r=>{

    let txt = r.innerText.toLowerCase();

    let ven = [
      r.children[3].innerText,
      r.children[4].innerText,
      r.children[5].innerText
    ];

    let show =
      (!q || txt.includes(q)) &&
      (!c || r.children[0].innerText == c) &&
      (!s || r.children[1].innerText == s) &&
      (!m || r.children[2].innerText == m) &&
      (!v || ven.includes(v));

    r.style.display = show ? "" : "none";

  });
}

function addDeleteBtn(row){
  if(isAdmin){
    let c = row.insertCell(6);
    c.innerHTML = '<button class="delete" onclick="del(this)">❌</button>';
  }
}

function adminLogin(){
  let p = prompt("Enter password");

  // If user clicked Cancel, do nothing
  if (p === null) {
    return;
  }

  if (p === "admin123") {
    isAdmin = true;
if(document.querySelector("#table thead tr").children.length === 6){
  let th = document.createElement("th");
  th.innerText = "Actions";
  document.querySelector("#table thead tr").appendChild(th);
}

    rows().forEach(r => {
      for (let i = 0; i < 6; i++) {
        r.children[i].contentEditable = true;
      }
      if (r.children.length < 7) {
        addDeleteBtn(r);
      }
    });

    alert("Admin mode enabled");
  } else {
    alert("Wrong password");
  }
}

document.getElementById("search").oninput = filter;
document.getElementById("category").onchange = filter;
document.getElementById("subcategory").onchange = filter;
document.getElementById("manufacturer").onchange = filter;
document.getElementById("vendor").onchange = filter;

function cleanNan(){
  rows().forEach(r=>{
    for(let i=0;i<6;i++){
      let cell = r.children[i];

      if(cell.innerText.trim().toLowerCase() === "nan"){
        cell.innerText = "";
      }
    }
  });
}

function saveData(){

  let data = [];

  rows().forEach(r => {

    let row = [];

    for(let i=0;i<6;i++){
      row.push(r.children[i].innerText.trim());
    }

    data.push(row);

  });

  localStorage.setItem("supplierData", JSON.stringify(data));

}

function loadData(){

  let data = JSON.parse(localStorage.getItem("supplierData"));

  if(!data) return;

  let tbody = document.querySelector("#table tbody");

  tbody.innerHTML = "";

  data.forEach(row => {

    let r = tbody.insertRow();

    row.forEach(cell => {

      let c = r.insertCell();

      c.contentEditable = isAdmin;

      c.innerText = cell;

    });

    if(isAdmin){
      addDeleteBtn(r);
    }

  });

}
function addRow(){
  if(!isAdmin){
    alert("Admin only");
    return;
  }

  let t=document.querySelector("#table tbody");
  let r=t.insertRow();

  for(let i=0;i<6;i++){
    let c=r.insertCell(i);
    c.contentEditable=true;
  }

  addDeleteBtn(r);
  
  saveData();
  populate();
  filter();
}
function del(btn){
  if(!isAdmin){
    alert("Admin only");
    return;
  }

  btn.closest("tr").remove();

  saveData();
  populate();
  filter();
}
function capitalizeTable(){

  rows().forEach(r=>{

    for(let i=0;i<6;i++){

      let cell = r.children[i];

      let text = cell.innerText.trim();

      // Preserve special company names
      if(
        text === "RS America" ||
        text === "TD Synnex" ||
        text === "ABB" ||
        text === "GE" ||
        text === "HP" ||
        text === "FS" ||
        text === "RSA" ||
        text === "INS" ||
        text === "RTDS" ||
        text === "SHI" ||
        text === "CDW"
      ){
        continue;
      }

      cell.innerText = text
        .toLowerCase()
        .replace(/\b\w/g, l => l.toUpperCase());

    }

  });

}

function renderTable(){

  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  supplierData.forEach(row => {

    let tr = document.createElement("tr");

    row.forEach(cellData => {

      let td = document.createElement("td");

      td.contentEditable = isAdmin;

      td.innerText = cellData;

      tr.appendChild(td);

    });

    tbody.appendChild(tr);

  });

}
window.onload = function(){

  if (localStorage.getItem("supplierData")) {
    loadData();
  } else {
    renderTable();
    saveData();
  }

  console.log(JSON.parse(localStorage.getItem("supplierData")));

  cleanNan();
  capitalizeTable();
  populate();
  filter();

  document.querySelector("#table").addEventListener("input", () => {
    if(isAdmin){
      saveData();
      populate();
    }
  });

};
